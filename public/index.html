<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Genome - 2.5D 멀티플레이어 숨바꼭질</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 인증(로그인/가입) 화면 -->
  <div id="auth-screen" class="screen active">
    <div class="auth-box">
      <h1>GENOME</h1>
      <p class="subtitle">2.5D 숨바꼭질</p>
      
      <div class="input-group">
        <input type="text" id="nickname-input" placeholder="닉네임 (중복불가)" autocomplete="off">
        <input type="password" id="password-input" placeholder="비밀번호">
      </div>
      
      <div class="button-group">
        <button id="login-btn" class="primary-btn">로그인</button>
        <button id="register-btn" class="secondary-btn">회원가입</button>
      </div>
      
      <p id="auth-message" class="message"></p>
    </div>
    <div class="version-text">a1.0</div>
  </div>

  <!-- 메인 메뉴 화면 -->
  <div id="menu-screen" class="screen">
    <div class="menu-box">
      <h1>로비</h1>
      
      <div class="profile-info">
        <h2 id="profile-nickname">닉네임</h2>
        <span id="profile-title" class="title-badge">뉴비</span>
        <div class="stats">
          <p>전적: <span id="stat-matches">0</span>전 <span id="stat-wins">0</span>승</p>
        </div>
      </div>
      
      <div class="button-group">
        <button id="quick-start-btn" class="primary-btn">빠른 시작 (준비 중)</button>
        <button id="join-room-btn" class="secondary-btn" onclick="document.getElementById('menu-screen').classList.remove('active'); document.getElementById('game-screen').classList.add('active'); startGame();">방 입장 (테스트용)</button>
        <button id="logout-btn" class="danger-btn">로그아웃</button>
      </div>
    </div>
    <div class="version-text">a1.0</div>
  </div>

  <!-- 인게임 화면 -->
  <div id="game-screen" class="screen">
    <canvas id="game-canvas"></canvas>
    
    <div id="game-ui">
      <div class="top-bar">
        <div class="status-box">상태: <span id="game-status">로비 대기 중</span></div>
      </div>
    </div>
    <div class="version-text">a1.0</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/network.js"></script>
  <script src="js/player.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
