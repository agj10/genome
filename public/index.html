<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Genome - 2.5D 멀티플레이어 숨바꼭질</title>
  <link rel="stylesheet" href="/css/style.css">
  
  <!-- Three.js Import Map -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <!-- 로그인 화면 -->
  <div id="login-screen" class="screen active">
    <div class="auth-box">
      <button id="theme-toggle" class="theme-toggle" title="테마 변경">🌙</button>
      <h1>GENOME</h1>
      <p class="subtitle">2.5D 숨바꼭질</p>
      
      <div class="input-group">
        <input type="text" id="login-nickname" placeholder="닉네임" autocomplete="off">
        <input type="password" id="login-password" placeholder="비밀번호">
      </div>
      
      <div class="button-group">
        <button id="login-btn" class="primary-btn">로그인</button>
      </div>
      
      <p id="login-message" class="message"></p>
      <div class="auth-link">
        <a href="#" id="go-to-register">계정이 없으신가요? 회원가입</a>
      </div>
    </div>
    </div>
    <div class="version-text">a5.0 (3D Edition)</div>
  </div>

  <!-- 회원가입 화면 -->
  <div id="register-screen" class="screen">
    <div class="auth-box">
      <h1>회원가입</h1>
      <p class="subtitle">GENOME에 오신 것을 환영합니다</p>
      
      <div class="input-group">
        <input type="text" id="register-nickname" placeholder="닉네임 (중복불가)" autocomplete="off">
        <input type="password" id="register-password" placeholder="비밀번호">
      </div>
      
      <div class="button-group">
        <button id="register-btn" class="primary-btn">가입하기</button>
      </div>
      
      <p id="register-message" class="message"></p>
      <div class="auth-link">
        <a href="#" id="go-to-login">이미 계정이 있으신가요? 로그인</a>
      </div>
    </div>
    </div>
    <div class="version-text">a5.0 (3D Edition)</div>
  </div>

  <!-- 메인 메뉴 화면 -->
  <div id="menu-screen" class="screen">
    <div class="menu-box">
      <button id="theme-toggle-menu" class="theme-toggle" title="테마 변경">🌙</button>
      <h1>로비</h1>
      
      <div class="profile-info">
        <h2 id="profile-nickname">닉네임</h2>
        <span id="profile-title" class="title-badge">뉴비</span>
        <div class="stats">
          <p>전적: <span id="stat-matches">0</span>전 <span id="stat-wins">0</span>승</p>
        </div>
      </div>
      
      <div class="button-group">
        <button id="quick-start-btn" class="primary-btn">빠른 시작</button>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
          <input type="text" id="room-code-input" placeholder="방 코드 (예: 3F4RUK)" style="flex: 1; text-transform: uppercase;" autocomplete="off">
          <button id="join-room-btn" class="secondary-btn" style="white-space: nowrap;">참가</button>
        </div>
        
        <div style="margin-top: 10px;">
          <div class="custom-select" id="custom-mode-select">
            <div class="custom-select-trigger" id="custom-mode-trigger">
              <span id="custom-mode-label">🎮 노멀 모드</span>
              <span class="arrow">▼</span>
            </div>
            <div class="custom-options">
              <div class="custom-option selected" data-value="normal">🎮 노멀 모드</div>
              <div class="custom-option" data-value="infection">🦠 감염 모드</div>
              <div class="custom-option" data-value="double">🤝 더블 모드</div>
            </div>
          </div>
        </div>

        <button id="logout-btn" class="danger-btn" style="margin-top: 15px;">로그아웃</button>
      </div>
    </div>
    <div class="version-text">a5.0 (3D Edition)</div>
  </div>

  <!-- 인게임 화면 -->
  <div id="game-screen" class="screen">
    <canvas id="game-canvas"></canvas>
    
    <div id="game-ui">
      <!-- 상단 HUD -->
      <div class="top-bar">
        <div class="status-box">
          <span id="game-status">로비 대기 중</span>
          <span id="game-timer" class="timer-text" style="display: none;">00:00</span>
          <button id="ready-btn" class="ready-btn">준비</button>
          <span id="ready-count" class="ready-count">0/0</span>
        </div>
        <div class="hp-box" id="hp-box" style="display: none;">
          HP: <div class="hp-bar-container"><div id="hp-bar-fill" class="hp-bar-fill"></div></div>
        </div>
      </div>

      <!-- 하단 드로잉 패널 (토글) -->
      <div class="bottom-bar">
        <button id="paint-toggle" class="paint-toggle-btn" style="display: none;">🎨 그리기</button>
        <div id="paint-panel" class="paint-panel">
          <div class="tools-row">
            <button id="tool-pen" class="tool-btn active" title="펜">✏️</button>
            <button id="tool-eraser" class="tool-btn" title="지우개">🧽</button>
            <button id="tool-fill" class="tool-btn" title="채우기">🪣</button>
            <button id="tool-picker" class="tool-btn" title="스포이드">💉</button>
            <button id="tool-undo" class="tool-btn" title="되돌리기">↩️</button>
            <button id="tool-redo" class="tool-btn" title="다시 실행">↪️</button>
          </div>
          <div class="tools-row">
            <input type="range" id="tool-size" min="1" max="30" value="4" title="굵기 조절">
            <input type="color" id="tool-color" value="#000000" title="색상 선택">
          </div>
          <div class="shortcuts-info">
            <span><b>[R]</b> 형태 변환</span> | 
            <span><b>[Q]</b> 분신(디코이) 남기기</span> | 
            <span><b>[X]</b> 분신 제거</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="version-text">a5.0 (3D Edition)</div>
  </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/network.js"></script>
  <script src="/js/camera.js"></script>
  <script src="/js/announcer.js"></script>
  <script src="/js/paintTool.js"></script>
  <script src="/js/player.js"></script>
  <script src="/js/gameState.js"></script>
  
  <script>
    // Custom Select Dropdown UI logic
    document.addEventListener('DOMContentLoaded', () => {
      const trigger = document.getElementById('custom-mode-trigger');
      const optionsContainer = document.querySelector('.custom-options');
      const label = document.getElementById('custom-mode-label');
      const options = document.querySelectorAll('.custom-option');
      let currentMode = 'normal';

      if (trigger) {
        trigger.addEventListener('click', () => {
          trigger.parentElement.classList.toggle('open');
        });

        options.forEach(opt => {
          opt.addEventListener('click', () => {
            options.forEach(o => o.classList.remove('selected'));
            opt.classList.add('selected');
            currentMode = opt.getAttribute('data-value');
            label.textContent = opt.textContent;
            trigger.parentElement.classList.remove('open');

            // Dispatch event for main.js to catch
            window.dispatchEvent(new CustomEvent('gameModeChanged', { detail: currentMode }));
          });
        });
        
        // Click outside to close
        document.addEventListener('click', (e) => {
          if (!trigger.parentElement.contains(e.target)) {
            trigger.parentElement.classList.remove('open');
          }
        });
      }
    });
  </script>

  <!-- Three.js 렌더러를 탑재한 메인 로직은 모듈로 불러옵니다 -->
  <script type="module" src="/js/main.js"></script>
</body>
</html>
